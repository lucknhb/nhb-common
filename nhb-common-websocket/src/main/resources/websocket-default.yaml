websocket:
  #端口
  port: 6666
  path: /ws
  #读空闲超时 秒（0禁用）
  reader-idle-time-seconds: 60
  #写空闲超时 秒
  writer-idle-time-seconds: 0
  #全空闲超时 秒
  all-idle-time-seconds: 0
  #最大帧载荷
  max-frame-size: 65536
  #Redisson主题名称
  cluster-topic: "global:ws:message"
  #离线用户信息主题名称
  offline-message-topic: "global:ws:offline-message:"
  #跨域请求是否允许携带或暴露凭证信息
  allow-credentials: true
  #允许访问源地址
  allowed-origins:
    - "*"
  #设置允许访问的请求头
  allowed-headers:
    - "*"